name: Deploy Clinic.js Reports

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  profile-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      NO_INSIGHT: "1"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare clinic output directories
        run: |
          mkdir -p clinic-reports/beta/{doctor,flame,bubbleprof}
          mkdir -p clinic-reports/v3/{doctor,flame,bubbleprof}
          mkdir -p clinic-reports/v4/{doctor,flame,bubbleprof}
          echo "Created output directory structure"

      - name: Build and profile all versions
        run: |
          npm run clinic:all
          echo "Profiling completed"

      - name: Validate clinic output
        run: |
          echo "Checking generated files..."
          find clinic-reports -name "*.html" -type f | head -20 || true
          echo "Total HTML reports: $(find clinic-reports -name '*.html' -type f | wc -l)"
          ls -lh clinic-reports/ || true
          ls -lh clinic-reports/beta/ || true
          ls -lh clinic-reports/v3/ || true
          ls -lh clinic-reports/v4/ || true

      - name: Cleanup trace logs
        run: |
          find . -name "node_trace.*.log" -type f -delete
          echo "Cleaned up node trace logs"

      - name: Cleanup large clinic data files
        run: |
          # Remove large binary trace/stack files from bubbleprof to reduce deployment size
          if [ -d clinic-reports ]; then
            find clinic-reports -name "*.clinic-bubbleprof-traceevent" -type f -delete
            find clinic-reports -name "*.clinic-bubbleprof-stacktrace" -type f -delete
            find clinic-reports -name "*.clinic-flame-*" -type f -size +100M -delete
            find clinic-reports -name "*.clinic-doctor-*" -type f -size +100M -delete
          fi
          echo "Cleaned up large clinic data files"

      - name: Copy static website content
        run: |
          cp -r public/* clinic-reports/
          echo "Deployment timestamp: $(date)" >> clinic-reports/deployment-info.txt
          echo "Static content copied to clinic-reports/"

      - name: Verify deployment content
        run: |
          echo "=== Final clinic-reports/ directory contents ==="
          du -sh clinic-reports/
          find clinic-reports -type f -name "*.html" | sort
          echo "=== Directory tree (depth 3) ==="
          find clinic-reports -maxdepth 3 -type d | sort

      - name: Upload clinic reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clinic-reports
          path: clinic-reports/
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: clinic-reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
