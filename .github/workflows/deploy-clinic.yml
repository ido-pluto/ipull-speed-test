name: Deploy Clinic.js Reports

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  profile-and-deploy:
    runs-on: ubuntu-latest
    env:
      NO_INSIGHT: "1"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and profile all versions
        run: npm run clinic:all

      - name: Copy static website content
        run: |
          cp -r public/* clinic/
          echo "Deployment timestamp: $(date)" >> clinic/deployment-info.txt

      - name: Upload clinic reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clinic-reports
          path: clinic/
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./clinic
          cname: false
